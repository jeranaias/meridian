name: Meridian CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (1,265 across 47 crates)
        run: cargo test --workspace
      - name: Clippy (workspace lints in Cargo.toml)
        run: cargo clippy --workspace

  build-no-std:
    name: no_std Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Check core crates compile for embedded
        run: |
          cargo check --target thumbv7em-none-eabihf -p meridian-hal
          cargo check --target thumbv7em-none-eabihf -p meridian-types
          cargo check --target thumbv7em-none-eabihf -p meridian-math
          cargo check --target thumbv7em-none-eabihf -p meridian-sync
