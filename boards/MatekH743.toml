timer = 5
channel = 2
pin = "A1"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 5
timer = 5
channel = 3
pin = "A2"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 6
timer = 5
channel = 4
pin = "A3"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 7
timer = 4
channel = 1
pin = "D12"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 8
timer = 4
channel = 2
pin = "D13"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 9
timer = 4
channel = 3
pin = "D14"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 10
