[[imu_probe]]
driver = "Invensensev3"
bus_type = "Spi"
bus_index = 1
spi_device = "icm42688"
rotation = "Yaw180"

[[imu_probe]]
driver = "Invensensev3"
bus_type = "Spi"
bus_index = 4
spi_device = "icm42605"
rotation = "Yaw270"

[[imu_probe]]
driver = "Invensense"
bus_type = "Spi"
bus_index = 4
spi_device = "icm20602"
rotation = "Roll180Yaw270"

[[imu_probe]]
driver = "Invensense"
bus_type = "Spi"
bus_index = 1
spi_device = "mpu6000"
rotation = "Roll180Yaw270"

[[baro_probe]]
driver = "Ms5611"
bus_type = "I2c"
bus_index = 0
address = 0x77

[[baro_probe]]
driver = "Dps310"
bus_type = "I2c"
bus_index = 0
address = 0x76

[[baro_probe]]
driver = "Bmp280"
bus_type = "I2c"
bus_index = 0
address = 0x76

[adc]
voltage_pin = 10
current_pin = 11
voltage_scale = 11.0
current_scale = 40.0

[misc]
led_pin = "E3"
buzzer_pin = "A15"
