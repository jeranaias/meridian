# MatekH743 — Meridian primary reference board
# Source: ArduPilot hwdef/MatekH743/hwdef.dat
# MCU: STM32H743VIH6, 8MHz crystal, 400MHz clock
# IMU: ICM42688 (SPI1) + ICM20602 (SPI4) + ICM42605 (SPI4)
# Baro: DPS310/BMP280/MS5611 (I2C2)
# 13 PWM outputs, 9 serial ports, SD card logging

[board]
name = "MatekH743"
board_id = 140
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 2048
ram_size_kb = 1024

[usb]
manufacturer = "Matek Systems"
product = "MatekH743"
vid = "0x1209"
pid = "0x5741"

[serial]
order = ["OTG1", "UART7", "USART1", "USART2", "USART3", "UART8", "UART4", "USART6", "OTG2"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "D7"
af = 5
dma_noshare = true

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "B3"
miso = "B4"
mosi = "B5"
af = 6
dma_noshare = false

[[spi_bus]]
index = 4
sck = "E12"
miso = "E13"
mosi = "E14"
af = 5
dma_noshare = true

[[spi_device]]
name = "icm42688"
bus = 1
cs = "C15"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 16000000

[[spi_device]]
name = "mpu6000"
bus = 1
cs = "C15"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 4000000

[[spi_device]]
name = "icm20602"
bus = 4
cs = "E11"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 4000000

[[spi_device]]
name = "icm42605"
bus = 4
cs = "C13"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 16000000

[[spi_device]]
name = "osd"
bus = 2
cs = "B12"
mode = 0
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "pixartflow"
bus = 3
cs = "D4"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 2000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 1
logical_index = 1
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "UART7"
uart_index = 7
tx = "E8"
rx = "E7"
cts = "E10"
rts = "E9"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 57600
default_protocol = 100  # MNP (Meridian Native Protocol) — primary comms, COBS-framed postcard

[[uart]]
serial_index = 3
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 4
peripheral = "USART3"
uart_index = 3
tx = "D8"
rx = "D9"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 5
peripheral = "UART8"
uart_index = 8
tx = "E1"
rx = "E0"
default_baud = 115200
default_protocol = 0  # None

[[uart]]
serial_index = 6
peripheral = "UART4"
uart_index = 4
tx = "B9"
rx = "B8"
default_baud = 115200
default_protocol = 0  # None

[[uart]]
serial_index = 7
peripheral = "USART6"
uart_index = 6
tx = "C6"
rx = "C7"
default_baud = 115200
default_protocol = 23  # RC (CRSF)

[[uart]]
serial_index = 8
peripheral = "OTG2"
is_usb = true
default_baud = 115200
default_protocol = 0  # None

[[pwm_output]]
pwm_num = 1
timer = 8
channel = 2
pin = "B0"
af = 3
complementary = true

[[pwm_output]]
pwm_num = 2
timer = 8
channel = 3
pin = "B1"
af = 3
complementary = true

[[pwm_output]]
