# MatekL431 — DroneCAN peripheral node
# Source: ArduPilot hwdef/MatekL431/hwdef.inc
# MCU: STM32L431, 8MHz crystal, 80MHz clock
# Minimal peripheral: SPI1 (RM3100 compass), I2C2, CAN1, 3 UARTs
# AP_PERIPH firmware — GPS/compass/baro/airspeed over DroneCAN

[board]
name = "MatekL431"
board_id = 1062
mcu = "STM32L431"
clock_hz = 80000000
oscillator_hz = 8000000
flash_size_kb = 256
ram_size_kb = 64

[serial]
order = ["USART1", "USART2", "USART3"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "B4"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_device]]
name = "rm3100"
bus = 1
cs = "A4"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 1000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "B13"
sda = "B14"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 57600
default_protocol = 0  # Debug

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 115200
default_protocol = 0  # MSP

[[uart]]
serial_index = 2
peripheral = "USART3"
uart_index = 3
tx = "B10"
rx = "B11"
default_baud = 115200
default_protocol = 5  # GPS

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "B3"
