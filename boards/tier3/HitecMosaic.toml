bus_index = 0
address = 0x22
rotation = "None"
external = false

[[compass_probe]]
driver = "Rm3100"
bus_type = "I2c"
bus_index = 0
address = 0x23
rotation = "None"
external = false

[adc]
voltage_pin = 0
current_pin = 0
