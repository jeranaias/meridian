# HITEC_MOSAIC — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F303xC, 24MHz crystal, 400MHz clock

[board]
name = "HITEC_MOSAIC"
board_id = 0
mcu = "STM32F303xC"
clock_hz = 400000000
oscillator_hz = 24000000
flash_size_kb = 256
ram_size_kb = 0

[serial]
order = ["USART2", "EMPTY", "EMPTY", "USART3"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = false

[[spi_bus]]
index = 1
sck = "B3"
miso = "B4"
mosi = "B5"
af = 5
dma_noshare = false

[[i2c_bus]]
index = 1
logical_index = 0
scl = "A15"
sda = "B7"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART3"
uart_index = 3
tx = "B10"
rx = "B11"
default_baud = 115200
default_protocol = 5  # GPS

[[baro_probe]]
driver = "Ms5611"
bus_type = "I2c"
bus_index = 0
address = 0x77

[[compass_probe]]
driver = "Rm3100"
bus_type = "I2c"
bus_index = 0
address = 0x20
rotation = "None"
external = false

[[compass_probe]]
driver = "Rm3100"
bus_type = "I2c"
bus_index = 0
address = 0x21
rotation = "None"
external = false

[[compass_probe]]
