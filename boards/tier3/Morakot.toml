# Morakot — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 8MHz crystal, 400MHz clock

[board]
name = "Morakot"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 2048
ram_size_kb = 1024

[usb]
manufacturer = "Taiphoon"

[serial]
order = ["OTG1", "USART1", "USART2", "USART3", "UART5", "USART6", "UART7", "UART8"]

[features]
sdcard = true
iomcu = false
ethernet = true
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "D7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 4
sck = "E2"
miso = "E5"
mosi = "E6"
af = 5
dma_noshare = false

[[spi_device]]
name = "imu1"
bus = 1
cs = "A15"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 16000000

[[spi_device]]
name = "osd"
bus = 4
cs = "E4"
mode = 0
low_speed_hz = 10000000
high_speed_hz = 10000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B9"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART1"
uart_index = 1
tx = "B14"
rx = "B15"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
