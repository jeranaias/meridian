# JPilot-C — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 16MHz crystal, 400MHz clock

[board]
name = "JPilot-C"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "UART7", "USART1", "USART2", "USART3", "UART8", "UART4"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 2

[[spi_bus]]
index = 1
sck = "B3"
miso = "A6"
mosi = "D7"
af = 5
dma_noshare = true

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = false

[[spi_bus]]
index = 4
sck = "E12"
miso = "E13"
mosi = "E14"
af = 5
dma_noshare = true

[[spi_device]]
name = "icm45686"
bus = 1
cs = "C15"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 24000000

[[spi_device]]
name = "dps310"
bus = 1
cs = "C14"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 10000000

[[spi_device]]
name = "icm42688"
bus = 2
cs = "C13"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 24000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "UART7"
uart_index = 7
tx = "E8"
rx = "E7"
default_baud = 57600
default_protocol = 2  # MAVLink2

