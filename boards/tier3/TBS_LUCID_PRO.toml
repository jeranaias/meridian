# TBS_LUCID_PRO — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F405, 8MHz crystal, 168MHz clock

[board]
name = "TBS_LUCID_PRO"
board_id = 0
mcu = "STM32F405"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 1024
ram_size_kb = 192

[serial]
order = ["OTG1", "USART1", "USART2", "USART3", "UART4", "UART5", "USART6"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = false

[[spi_bus]]
