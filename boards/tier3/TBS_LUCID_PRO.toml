sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "C10"
miso = "C11"
mosi = "B5"
af = 6
dma_noshare = false

[[spi_device]]
name = "dataflash"
bus = 3
cs = "A15"
mode = 3
low_speed_hz = 104000000
high_speed_hz = 104000000

[[spi_device]]
name = "osd"
bus = 2
cs = "B12"
mode = 0
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "imu1"
bus = 1
cs = "A4"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 8000000

[[spi_device]]
name = "imu2"
bus = 1
cs = "A4"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 8000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B9"
af = 4
speed_khz = 400
internal = false

[[uart]]
