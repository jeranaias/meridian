# UAV-DEV-M10S-L4 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32L431, 24MHz crystal, 80MHz clock

[board]
name = "UAV-DEV-M10S-L4"
board_id = 0
mcu = "STM32L431"
clock_hz = 80000000
oscillator_hz = 24000000
flash_size_kb = 256
ram_size_kb = 64

[serial]
order = ["USART3"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "USART3"
uart_index = 3
tx = "B10"
rx = "B11"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[compass_probe]]
driver = "Bmm150"
bus_type = "I2c"
bus_index = 0
address = 0x10
rotation = "Roll180"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "C13"

