# SierraF9P — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F412Rx, 16MHz crystal, 400MHz clock

[board]
name = "SierraF9P"
board_id = 0
mcu = "STM32F412Rx"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 1024
ram_size_kb = 0

[serial]
order = ["USART1", "EMPTY", "EMPTY", "USART2"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_device]]
name = "dps310"
bus = 1
cs = "C12"
mode = 3
low_speed_hz = 5000000
high_speed_hz = 5000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 115200
default_protocol = 5  # GPS

[[pwm_output]]
pwm_num = 1
timer = 2
channel = 1
pin = "A15"
af = 1
complementary = false

[[baro_probe]]
driver = "Dps310"
bus_type = "Spi"
bus_index = 1
spi_device = "dps310"

[[compass_probe]]
driver = "Qmc5883l"
bus_type = "I2c"
bus_index = 0
address = 0x0D
rotation = "Pitch180Yaw90"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
buzzer_pin = "B5"

