# Nucleo491 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32G491, 24MHz crystal, 170MHz clock

[board]
name = "Nucleo491"
board_id = 0
mcu = "STM32G491"
clock_hz = 170000000
oscillator_hz = 24000000
flash_size_kb = 256
ram_size_kb = 112

[serial]
order = ["USART1"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[i2c_bus]]
index = 1
logical_index = 0
scl = "A15"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[imu_probe]]
driver = "Invensense"
bus_type = "I2c"
bus_index = 0
address = 105
rotation = "None"

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "A5"

