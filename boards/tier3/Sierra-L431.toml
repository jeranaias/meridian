mosi = "A7"
af = 5
dma_noshare = false

[[spi_device]]
name = "rm3100"
bus = 1
cs = "B12"
mode = 0
low_speed_hz = 1000000
high_speed_hz = 1000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[compass_probe]]
driver = "Rm3100"
bus_type = "Spi"
bus_index = 0
address = 0x00
rotation = "None"
external = false

[adc]
voltage_pin = 0
current_pin = 0
