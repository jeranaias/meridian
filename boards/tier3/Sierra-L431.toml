# SierraL431 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32L431, 16MHz crystal, 80MHz clock

[board]
name = "SierraL431"
board_id = 0
mcu = "STM32L431"
clock_hz = 80000000
