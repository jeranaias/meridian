# 3DR-ASAUAV — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32L431, 0MHz crystal, 80MHz clock

[board]
name = "3DR-ASAUAV"
board_id = 0
mcu = "STM32L431"
clock_hz = 80000000
oscillator_hz = 32768
flash_size_kb = 256
ram_size_kb = 64

[serial]
order = ["USART1", "USART2"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[i2c_bus]]
index = 1
logical_index = 0
scl = "A9"
sda = "A10"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
cts = "A0"
rts = "A1"
default_baud = 57600
default_protocol = 2  # MAVLink2

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "B1"

