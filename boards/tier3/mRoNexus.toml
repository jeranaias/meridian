# MRO_NEXUS — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 25MHz crystal, 400MHz clock

[board]
name = "MRO_NEXUS"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 25000000
flash_size_kb = 2048
ram_size_kb = 1024

[usb]
manufacturer = "mRo"

[serial]
order = ["OTG1", "UART7", "OTG2", "UART4"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 2

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "B3"
miso = "B4"
mosi = "D6"
af = 6
dma_noshare = false

[[spi_bus]]
index = 4
sck = "E2"
miso = "E5"
mosi = "E6"
af = 5
dma_noshare = false

[[spi_device]]
name = "adis16470"
bus = 2
cs = "B12"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 2000000

[[spi_device]]
name = "icm40609d"
bus = 3
cs = "A15"
mode = 3
low_speed_hz = 16000000
high_speed_hz = 16000000

[[spi_device]]
name = "rm3100"
bus = 3
cs = "B11"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 1000000

[[spi_device]]
name = "dps310"
bus = 4
cs = "E3"
mode = 3
low_speed_hz = 5000000
high_speed_hz = 5000000

[[spi_device]]
name = "ramtron"
bus = 4
cs = "E4"
mode = 3
low_speed_hz = 8000000
high_speed_hz = 8000000

[[i2c_bus]]
index = 4
logical_index = 0
scl = "D12"
sda = "D13"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "UART7"
uart_index = 7
tx = "E8"
rx = "E7"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "OTG2"
is_usb = true
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "UART4"
uart_index = 4
tx = "D1"
rx = "D0"
default_baud = 115200
default_protocol = 5  # GPS

[[imu_probe]]
driver = "Adis1647x"
bus_type = "Spi"
bus_index = 2
spi_device = "adis16470"
rotation = "Roll180"

[[imu_probe]]
driver = "Invensensev3"
bus_type = "Spi"
bus_index = 3
spi_device = "icm40609d"
rotation = "None"

[[baro_probe]]
driver = "Dps310"
bus_type = "Spi"
bus_index = 4
spi_device = "dps310"

[[compass_probe]]
driver = "Rm3100"
bus_type = "Spi"
bus_index = 0
address = 0x00
rotation = "Yaw180"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "A6"

