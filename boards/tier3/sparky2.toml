# SPARKYV2 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F405, 8MHz crystal, 168MHz clock

[board]
name = "SPARKYV2"
board_id = 0
mcu = "STM32F405"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 1024
ram_size_kb = 192

[serial]
order = ["OTG1", "USART3", "EMPTY", "USART1"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "C10"
miso = "C11"
mosi = "C12"
af = 6
dma_noshare = false

[[spi_device]]
name = "mpu9250"
bus = 1
cs = "C4"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 4000000

[[spi_device]]
name = "dataflash"
bus = 3
cs = "B3"
mode = 3
low_speed_hz = 32000000
high_speed_hz = 32000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B9"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART3"
uart_index = 3
tx = "B10"
rx = "B11"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 115200
default_protocol = 5  # GPS

[[pwm_output]]
pwm_num = 1
timer = 3
channel = 3
pin = "B0"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 2
timer = 3
channel = 4
pin = "B1"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 3
timer = 2
channel = 4
pin = "A3"
af = 1
complementary = false

[[pwm_output]]
pwm_num = 4
timer = 2
channel = 3
pin = "A2"
af = 1
complementary = false

[[pwm_output]]
pwm_num = 5
timer = 2
channel = 2
pin = "A1"
af = 1
complementary = false

[[pwm_output]]
pwm_num = 6
timer = 2
channel = 1
pin = "A0"
af = 1
complementary = false

[[pwm_output]]
pwm_num = 7
timer = 1
channel = 2
pin = "B14"
af = 1
complementary = true

[[imu_probe]]
driver = "Invensense"
bus_type = "Spi"
bus_index = 1
spi_device = "mpu9250"
rotation = "None"

[[baro_probe]]
driver = "Ms5611"
bus_type = "I2c"
bus_index = 0
address = 0x77

[[compass_probe]]
driver = "Ak8963"
bus_type = "I2c"
bus_index = 0
address = 0x00
rotation = "None"
external = true

[adc]
voltage_pin = 12
current_pin = 13
voltage_scale = 10.1
current_scale = 17.0

[misc]
led_pin = "B5"

