# AEROFOX_AIRSPEED — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F103xB, 8MHz crystal, 400MHz clock

[board]
name = "AEROFOX_AIRSPEED"
board_id = 0
mcu = "STM32F103xB"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 128
ram_size_kb = 0

[serial]
order = ["EMPTY", "EMPTY", "EMPTY", "USART1"]

[features]
