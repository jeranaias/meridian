# FlyingMoonF407 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F407, 8MHz crystal, 168MHz clock

[board]
name = "FlyingMoonF407"
board_id = 0
mcu = "STM32F407"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 1024
ram_size_kb = 192

[serial]
order = ["OTG1", "USART2", "UART4", "USART3", "USART1"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = false

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = false

[[spi_device]]
name = "icm20689"
bus = 1
cs = "A4"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 8000000

[[spi_device]]
name = "ramtron"
bus = 2
cs = "B12"
mode = 3
low_speed_hz = 8000000
high_speed_hz = 8000000

[[spi_device]]
name = "sdcard"
bus = 2
cs = "E15"
mode = 0
low_speed_hz = 1000000
high_speed_hz = 8000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B9"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 2
logical_index = 1
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
