peripheral = "UART4"
uart_index = 4
tx = "C10"
rx = "C11"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART3"
uart_index = 3
tx = "D8"
rx = "D9"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 4
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 5  # GPS

