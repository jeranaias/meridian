high_speed_hz = 1000000

[[uart]]
serial_index = 0
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[compass_probe]]
driver = "Rm3100"
bus_type = "Spi"
bus_index = 0
address = 0x00
rotation = "None"
external = false

[adc]
voltage_pin = 0
current_pin = 0
