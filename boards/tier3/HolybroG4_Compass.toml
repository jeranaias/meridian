# HolybroCompass — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32G474, 16MHz crystal, 170MHz clock

[board]
name = "HolybroCompass"
board_id = 0
mcu = "STM32G474"
clock_hz = 170000000
