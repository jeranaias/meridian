# PX4_FMU_V4 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F427, 24MHz crystal, 168MHz clock

[board]
name = "PX4_FMU_V4"
board_id = 0
mcu = "STM32F427"
clock_hz = 168000000
oscillator_hz = 24000000
flash_size_kb = 2048
ram_size_kb = 256

[serial]
