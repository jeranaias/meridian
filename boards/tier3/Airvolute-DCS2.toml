# AIRVOLUTE_DCS2 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 16MHz crystal, 400MHz clock

[board]
name = "AIRVOLUTE_DCS2"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 2048
ram_size_kb = 1024

[usb]
manufacturer = "Airvolute"

[serial]
order = ["OTG1", "USART1", "USART2", "USART3"]

[features]
sdcard = true
iomcu = false
ethernet = true
can = true
can_bus_count = 2

[[spi_bus]]
index = 1
sck = "A5"
miso = "B4"
mosi = "D7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 4
sck = "E2"
miso = "E5"
mosi = "E6"
af = 5
dma_noshare = false

[[spi_device]]
name = "bmi088_g"
bus = 1
cs = "E13"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "bmi088_a"
bus = 1
cs = "D12"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "bmp390"
bus = 1
cs = "D13"
mode = 3
low_speed_hz = 5000000
high_speed_hz = 5000000

[[spi_device]]
name = "icm42688_ext"
bus = 4
cs = "D15"
mode = 3
low_speed_hz = 5000000
high_speed_hz = 5000000

[[spi_device]]
name = "lis3mdl"
bus = 4
cs = "D14"
mode = 3
low_speed_hz = 5000000
high_speed_hz = 5000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART1"
uart_index = 1
tx = "B14"
rx = "A10"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART3"
uart_index = 3
rx = "D9"
default_baud = 115200
default_protocol = 5  # GPS

[[pwm_output]]
pwm_num = 1
timer = 2
channel = 2
pin = "B3"
af = 1
