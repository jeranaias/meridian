timer = 1
channel = 4
pin = "E14"
af = 1
complementary = false

[[imu_probe]]
driver = "Bmi088"
bus_type = "Spi"
bus_index = 1
spi_device = "bmi088_a"
rotation = "None"

[[imu_probe]]
driver = "Invensense"
bus_type = "Spi"
bus_index = 4
spi_device = "icm42688_ext"
rotation = "None"

[[baro_probe]]
driver = "Bmp388"
bus_type = "Spi"
