# ARK_FPV — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 16MHz crystal, 400MHz clock

[board]
name = "ARK_FPV"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "UART7", "UART5", "USART1", "USART2", "UART4", "USART6", "OTG2"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "G9"
mosi = "B5"
af = 5
dma_noshare = true

[[spi_bus]]
index = 6
sck = "B3"
miso = "A6"
mosi = "G14"
af = 5
dma_noshare = true

[[spi_device]]
name = "iim42653"
bus = 1
cs = "I9"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 16000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B9"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 2
logical_index = 1
scl = "F1"
sda = "F0"
af = 4
speed_khz = 400
internal = true

[[i2c_bus]]
index = 4
logical_index = 2
scl = "F14"
sda = "F15"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "UART7"
uart_index = 7
tx = "E8"
rx = "F6"
cts = "E10"
rts = "F8"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "UART5"
uart_index = 5
tx = "C12"
rx = "D2"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 4
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "A3"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 5
peripheral = "UART4"
uart_index = 4
tx = "H13"
rx = "H14"
default_baud = 115200
default_protocol = 0  # None

[[uart]]
serial_index = 6
peripheral = "USART6"
uart_index = 6
tx = "C6"
rx = "C7"
default_baud = 115200
default_protocol = 0  # None

[[uart]]
serial_index = 7
peripheral = "OTG2"
is_usb = true
default_baud = 115200
default_protocol = 0  # None

[[pwm_output]]
pwm_num = 1
timer = 5
channel = 4
pin = "I0"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 2
timer = 5
channel = 3
pin = "H12"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 3
timer = 5
channel = 2
pin = "H11"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 4
timer = 5
channel = 1
pin = "H10"
af = 2
complementary = false

[[pwm_output]]
pwm_num = 5
timer = 8
channel = 1
pin = "I5"
af = 3
complementary = false

[[pwm_output]]
