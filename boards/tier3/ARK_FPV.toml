[[imu_probe]]
driver = "Invensensev3"
bus_type = "Spi"
bus_index = 1
spi_device = "iim42653"
rotation = "Yaw270"

[[baro_probe]]
driver = "Bmp388"
bus_type = "I2c"
bus_index = 1
address = 0x76

[adc]
voltage_pin = 9
current_pin = 12
voltage_scale = 21
current_scale = 120

[misc]
led_pin = "E3"
buzzer_pin = "F9"

