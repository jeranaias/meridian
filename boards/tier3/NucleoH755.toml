# DURANDAL — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H757, 8MHz crystal, 400MHz clock

[board]
name = "DURANDAL"
board_id = 0
mcu = "STM32H757"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "USART2", "UART7", "USART1", "UART4", "UART5"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "B3"
miso = "B4"
mosi = "B5"
af = 6
dma_noshare = false

[[spi_device]]
name = "icm20948"
bus = 3
cs = "C7"
mode = 3
low_speed_hz = 4000000
high_speed_hz = 8000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
cts = "D3"
rts = "D4"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
