# sw-boom-f407 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F407, 8MHz crystal, 168MHz clock

[board]
name = "sw-boom-f407"
board_id = 0
mcu = "STM32F407"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 512
ram_size_kb = 192

[serial]
order = ["USART6", "USART2", "USART3", "UART4"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 2

[[uart]]
serial_index = 0
peripheral = "USART6"
uart_index = 6
tx = "C6"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
rx = "D6"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "USART3"
uart_index = 3
rx = "D9"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "UART4"
uart_index = 4
tx = "A0"
rx = "A1"
default_baud = 115200
default_protocol = 5  # GPS

[[pwm_output]]
pwm_num = 1
timer = 1
channel = 1
pin = "E9"
af = 1
complementary = false

[[pwm_output]]
pwm_num = 2
timer = 1
channel = 2
pin = "E11"
af = 1
complementary = false

[[pwm_output]]
pwm_num = 4
timer = 2
channel = 4
pin = "B11"
af = 1
complementary = false

[adc]
voltage_pin = 0
current_pin = 0
