# MatekG474 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32G474, 8MHz crystal, 170MHz clock

[board]
name = "MatekG474"
board_id = 0
mcu = "STM32G474"
clock_hz = 170000000
oscillator_hz = 8000000
flash_size_kb = 512
ram_size_kb = 128

[serial]
order = ["EMPTY", "USART1", "USART2", "USART3", "UART4"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 2

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = true

[[spi_device]]
name = "rm3100"
bus = 2
cs = "B12"
mode = 0
low_speed_hz = 1000000
high_speed_hz = 1000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "A13"
sda = "A14"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 2
logical_index = 1
scl = "C4"
sda = "A8"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "EMPTY"
uart_index = 0
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "USART2"
uart_index = 2
tx = "B3"
rx = "B4"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART3"
uart_index = 3
tx = "B10"
rx = "B11"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 4
peripheral = "UART4"
uart_index = 4
tx = "C10"
rx = "C11"
default_baud = 115200
default_protocol = 5  # GPS

[[compass_probe]]
driver = "Rm3100"
bus_type = "Spi"
bus_index = 0
address = 0x00
rotation = "Pitch180"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "C13"

