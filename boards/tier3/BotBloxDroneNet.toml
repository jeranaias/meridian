# BotBloxSwitch — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H723, 16MHz crystal, 550MHz clock

[board]
name = "BotBloxSwitch"
board_id = 0
mcu = "STM32H723"
clock_hz = 550000000
oscillator_hz = 16000000
flash_size_kb = 1024
ram_size_kb = 564

[serial]
order = ["OTG1", "USART3"]

[features]
sdcard = false
iomcu = false
ethernet = true
can = true
can_bus_count = 1

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART3"
uart_index = 3
tx = "D8"
rx = "D9"
cts = "D11"
rts = "D12"
default_baud = 57600
default_protocol = 2  # MAVLink2

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "C0"

