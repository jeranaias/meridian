# C_RTK2_HP — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F412Rx, 16MHz crystal, 400MHz clock

[board]
name = "C_RTK2_HP"
board_id = 0
mcu = "STM32F412Rx"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 512
ram_size_kb = 0

[serial]
order = ["USART1", "EMPTY", "EMPTY", "USART2"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[i2c_bus]]
index = 3
logical_index = 0
scl = "A8"
sda = "B4"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 115200
default_protocol = 5  # GPS

[[compass_probe]]
driver = "Rm3100"
bus_type = "I2c"
bus_index = 0
address = 0x20
rotation = "Yaw270"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "B0"

