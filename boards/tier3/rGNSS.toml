# rGNSS — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32G491, 16MHz crystal, 170MHz clock

[board]
name = "rGNSS"
board_id = 0
mcu = "STM32G491"
clock_hz = 170000000
oscillator_hz = 16000000
flash_size_kb = 512
ram_size_kb = 112

[serial]
order = ["USART2"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_device]]
name = "rm3100"
bus = 1
cs = "B0"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 1000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "A9"
sda = "A8"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "USART2"
uart_index = 2
tx = "B3"
rx = "B4"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[baro_probe]]
driver = "Bmp388"
bus_type = "I2c"
bus_index = 0
address = 0x77

[[compass_probe]]
driver = "Rm3100"
bus_type = "Spi"
bus_index = 0
address = 0x00
rotation = "None"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "A0"

