# RADIX2HD — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H750, 16MHz crystal, 480MHz clock

[board]
name = "RADIX2HD"
board_id = 0
mcu = "STM32H750"
clock_hz = 480000000
oscillator_hz = 16000000
flash_size_kb = 128
ram_size_kb = 1024

[serial]
order = ["OTG1", "USART1", "USART2", "USART3", "UART4", "UART5", "USART6", "UART7"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "B4"
mosi = "D7"
af = 5
dma_noshare = true

[[spi_device]]
name = "bmi270"
bus = 1
cs = "D3"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 10000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART1"
uart_index = 1
tx = "B14"
rx = "B15"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
