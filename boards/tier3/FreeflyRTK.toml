# FreeflyRTK — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F732xx, 16MHz crystal, 400MHz clock

[board]
name = "FreeflyRTK"
board_id = 0
mcu = "STM32F732xx"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 512
ram_size_kb = 0

[serial]
order = ["OTG1", "USART2", "USART3"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 3
sck = "B3"
miso = "C11"
mosi = "C12"
af = 6
dma_noshare = false

[[spi_device]]
name = "lsm6ds3"
bus = 3
cs = "A15"
mode = 0
low_speed_hz = 1000000
high_speed_hz = 8000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = true

[[i2c_bus]]
index = 3
logical_index = 1
scl = "A8"
sda = "C9"
af = 4
speed_khz = 400
internal = true

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "USART3"
uart_index = 3
tx = "B10"
rx = "B11"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[baro_probe]]
driver = "Bmp388"
bus_type = "I2c"
bus_index = 0
address = 0x77

[[compass_probe]]
driver = "Ist8310"
bus_type = "I2c"
bus_index = 0
address = 0x0E
rotation = "None"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "A6"

