# DURANDAL — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 8MHz crystal, 400MHz clock

[board]
name = "DURANDAL"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "EMPTY", "EMPTY", "UART7"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = false

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "B3"
miso = "B4"
mosi = "B5"
af = 6
dma_noshare = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "EMPTY"
uart_index = 0
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "UART7"
uart_index = 7
tx = "E8"
rx = "F6"
default_baud = 115200
default_protocol = 5  # GPS

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "B0"

