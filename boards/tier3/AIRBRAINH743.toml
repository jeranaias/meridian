bus = 2
cs = "D4"
mode = 3
low_speed_hz = 104000000
high_speed_hz = 104000000

[[spi_device]]
name = "imu1"
bus = 1
cs = "A3"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 16000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
