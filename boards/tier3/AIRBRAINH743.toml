# AIRBRAIN_H743 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 8MHz crystal, 400MHz clock

[board]
name = "AIRBRAIN_H743"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "USART1", "USART2", "USART3", "UART4", "UART5", "EMPTY", "UART7", "UART8"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = false

[[spi_bus]]
