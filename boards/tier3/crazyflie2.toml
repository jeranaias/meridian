scl = "A8"
sda = "C9"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 1
logical_index = 1
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
