# CRAZYFLIE — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F405, 8MHz crystal, 168MHz clock

[board]
name = "CRAZYFLIE"
board_id = 0
mcu = "STM32F405"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 1024
ram_size_kb = 192

[serial]
order = ["OTG1", "USART3", "USART6", "USART2"]

[features]
