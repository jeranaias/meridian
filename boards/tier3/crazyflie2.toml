peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART3"
uart_index = 3
tx = "C10"
rx = "C11"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
