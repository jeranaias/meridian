# VUAV-TinyV7 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 16MHz crystal, 400MHz clock

[board]
name = "VUAV-TinyV7"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "USART2", "UART5", "USART1", "USART3", "UART7", "OTG2"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "B3"
miso = "A6"
mosi = "D7"
af = 5
dma_noshare = true

[[spi_bus]]
index = 4
sck = "E12"
miso = "E13"
mosi = "E14"
af = 5
dma_noshare = false

[[spi_device]]
name = "imu1"
bus = 4
cs = "C1"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 16000000

[[spi_device]]
name = "bmi088_a"
bus = 1
cs = "B5"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "bmi088_g"
bus = 1
cs = "A15"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "ramtron"
bus = 4
cs = "E2"
mode = 3
low_speed_hz = 5000000
high_speed_hz = 5000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B8"
sda = "B9"
af = 4
speed_khz = 400
internal = true

[[i2c_bus]]
index = 2
logical_index = 1
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 4
logical_index = 2
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
cts = "D3"
rts = "D4"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "UART5"
uart_index = 5
tx = "B13"
rx = "B12"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 4
peripheral = "USART3"
uart_index = 3
tx = "D8"
rx = "D9"
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 5
peripheral = "UART7"
uart_index = 7
tx = "E8"
rx = "E7"
default_baud = 115200
default_protocol = 0  # None

[[uart]]
serial_index = 6
peripheral = "OTG2"
is_usb = true
default_baud = 115200
default_protocol = 0  # None

