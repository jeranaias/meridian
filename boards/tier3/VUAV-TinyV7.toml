address = 0x63

[[compass_probe]]
driver = "Ist8310"
bus_type = "I2c"
bus_index = 0
address = 0x0E
rotation = "Yaw180"
external = false

[[compass_probe]]
driver = "Qmc5883l"
bus_type = "I2c"
bus_index = 0
address = 0x0D
rotation = "Pitch180Yaw90"
external = false

