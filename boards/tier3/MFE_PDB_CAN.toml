# MFE_PDB_CAN — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32L431, 8MHz crystal, 80MHz clock

[board]
name = "MFE_PDB_CAN"
board_id = 0
mcu = "STM32L431"
clock_hz = 80000000
oscillator_hz = 8000000
flash_size_kb = 256
ram_size_kb = 64

[serial]
order = ["USART1", "USART2", "USART3"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

