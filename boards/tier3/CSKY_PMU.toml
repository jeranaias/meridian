# CSKY_PMU — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F412Rx, 8MHz crystal, 400MHz clock

[board]
name = "CSKY_PMU"
board_id = 0
mcu = "STM32F412Rx"
clock_hz = 400000000
oscillator_hz = 8000000
flash_size_kb = 512
ram_size_kb = 0

[serial]
order = ["USART1"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_device]]
name = "INA23X"
bus = 1
cs = "A4"
mode = 1
low_speed_hz = 10000000
high_speed_hz = 10000000

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 2  # MAVLink2

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "B14"

