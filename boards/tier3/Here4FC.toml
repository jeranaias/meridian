# HERE3PLUS — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H757, 24MHz crystal, 400MHz clock

[board]
name = "HERE3PLUS"
board_id = 0
mcu = "STM32H757"
clock_hz = 400000000
oscillator_hz = 24000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["USART1", "UART4", "UART8", "USART2"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 2

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "B3"
miso = "B4"
mosi = "B2"
af = 6
dma_noshare = false

[[spi_device]]
name = "rm3100"
bus = 3
cs = "B1"
mode = 0
low_speed_hz = 1000000
high_speed_hz = 1000000

[[spi_device]]
name = "icm42688"
bus = 1
cs = "A8"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 8000000

[[spi_device]]
name = "ms5611"
bus = 1
cs = "A9"
mode = 3
low_speed_hz = 20000000
high_speed_hz = 20000000

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "UART4"
uart_index = 4
tx = "A12"
rx = "A11"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "UART8"
uart_index = 8
tx = "E1"
rx = "E0"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 3
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
default_baud = 115200
default_protocol = 5  # GPS

[[pwm_output]]
pwm_num = 1
timer = 1
channel = 1
pin = "E9"
af = 1
complementary = false

[[pwm_output]]
