# MFE_POS3_CAN — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F427, 8MHz crystal, 168MHz clock

[board]
name = "MFE_POS3_CAN"
board_id = 0
mcu = "STM32F427"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 2048
ram_size_kb = 256

[serial]
order = ["USART1", "USART2"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = true
can_bus_count = 1

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_device]]
name = "rm3100"
bus = 1
cs = "A4"
mode = 3
low_speed_hz = 1000000
high_speed_hz = 1000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "USART1"
uart_index = 1
tx = "B6"
rx = "B7"
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART2"
uart_index = 2
tx = "D5"
rx = "D6"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[compass_probe]]
driver = "Rm3100"
bus_type = "Spi"
bus_index = 0
address = 0x00
rotation = "None"
external = false

[[compass_probe]]
driver = "Ist8310"
bus_type = "I2c"
bus_index = 0
address = 0x0C
rotation = "None"
external = false

[adc]
voltage_pin = 0
current_pin = 0
voltage_scale = 11.0
current_scale = 17.0

[misc]
led_pin = "C6"

