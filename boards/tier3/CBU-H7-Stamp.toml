# CBU_StampH743 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 16MHz crystal, 480MHz clock

[board]
name = "CBU_StampH743"
board_id = 0
mcu = "STM32H743"
clock_hz = 480000000
oscillator_hz = 16000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
