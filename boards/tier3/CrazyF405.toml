# CrazyF405 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32F405, 8MHz crystal, 168MHz clock

[board]
name = "CrazyF405"
board_id = 0
mcu = "STM32F405"
clock_hz = 168000000
oscillator_hz = 8000000
flash_size_kb = 1024
ram_size_kb = 192

[serial]
order = ["OTG1", "USART1", "USART2", "EMPTY", "EMPTY", "USART6"]

[features]
sdcard = false
iomcu = false
ethernet = false
can = false

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = true

[[spi_bus]]
index = 2
sck = "B13"
miso = "B14"
mosi = "B15"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "C10"
miso = "C11"
mosi = "C12"
af = 6
dma_noshare = false

[[spi_device]]
name = "dataflash"
bus = 3
cs = "A15"
mode = 3
low_speed_hz = 104000000
high_speed_hz = 104000000

[[spi_device]]
name = "bmi270"
bus = 1
cs = "A4"
mode = 3
low_speed_hz = 2000000
high_speed_hz = 10000000

[[i2c_bus]]
index = 2
logical_index = 0
scl = "B10"
sda = "B11"
af = 4
speed_khz = 400
internal = false

[[uart]]
serial_index = 0
peripheral = "OTG1"
is_usb = true
default_baud = 115200
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 1
peripheral = "USART1"
uart_index = 1
tx = "A9"
rx = "A10"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
serial_index = 2
peripheral = "USART2"
uart_index = 2
tx = "A2"
rx = "A3"
default_baud = 57600
default_protocol = 2  # MAVLink2

[[uart]]
