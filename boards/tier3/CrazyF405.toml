peripheral = "EMPTY"
uart_index = 0
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 4
peripheral = "EMPTY"
uart_index = 0
default_baud = 115200
default_protocol = 5  # GPS

[[uart]]
serial_index = 5
peripheral = "USART6"
uart_index = 6
tx = "C6"
rx = "C7"
default_baud = 115200
default_protocol = 0  # None

[[pwm_output]]
