# NxtPX4v2 — Meridian board configuration
# Auto-generated from ArduPilot hwdef.dat by hwdef-to-toml.py
# MCU: STM32H743, 16MHz crystal, 400MHz clock

[board]
name = "NxtPX4v2"
board_id = 0
mcu = "STM32H743"
clock_hz = 400000000
oscillator_hz = 16000000
flash_size_kb = 2048
ram_size_kb = 1024

[serial]
order = ["OTG1", "USART2", "UART4", "USART1", "USART3", "UART7", "UART5", "UART8"]

[features]
sdcard = true
iomcu = false
ethernet = false
can = false

[[spi_bus]]
index = 1
sck = "A5"
miso = "A6"
mosi = "A7"
af = 5
dma_noshare = false

[[spi_bus]]
index = 3
sck = "B3"
miso = "B4"
mosi = "B2"
af = 6
dma_noshare = false

[[spi_bus]]
index = 4
sck = "E2"
miso = "E5"
mosi = "E6"
af = 5
dma_noshare = false

[[spi_device]]
name = "imu0_a"
bus = 1
cs = "A2"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "imu0_g"
bus = 1
cs = "A3"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
name = "imu1_a"
bus = 4
cs = "C13"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[spi_device]]
