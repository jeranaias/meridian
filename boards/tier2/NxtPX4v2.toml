bus = 4
cs = "C2"
mode = 3
low_speed_hz = 10000000
high_speed_hz = 10000000

[[i2c_bus]]
index = 1
logical_index = 0
scl = "B6"
sda = "B7"
af = 4
speed_khz = 400
internal = false

[[i2c_bus]]
index = 4
logical_index = 1
scl = "D12"
sda = "D13"
af = 4
speed_khz = 400
internal = false

[[uart]]
